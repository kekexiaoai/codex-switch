name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test And Validate (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64 / macOS 14
            runner: macos-14
            arch: arm64
          - label: x86_64 / macOS 15 Intel
            runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Toolchain Versions
        run: |
          echo "Expected architecture: ${{ matrix.arch }}"
          uname -m
          swift --version
          xcodebuild -version

      - name: Validate Workflow Runner Labels
        run: ./scripts/verify-github-workflow-runners.sh

      - name: Xcode Project Tests
        run: xcodebuild test -project apps/mac-client/CodexSwitch.xcodeproj -scheme CodexSwitch -destination 'platform=macOS'

      - name: Verify Packaging Script
        run: ./scripts/package-macos-app.sh
