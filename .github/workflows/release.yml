name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: false
        default: main
      tag_name:
        description: Release tag name
        required: false
        default: ""
      prerelease:
        description: Mark the GitHub release as prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test Package And Publish Release
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Release Metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG_NAME="$INPUT_TAG"
            if [[ -z "$TAG_NAME" ]]; then
              TAG_NAME="manual-${GITHUB_RUN_NUMBER}"
            fi
          else
            TAG_NAME="$REF_NAME"
          fi

          ZIP_NAME="Codex-Switch-${TAG_NAME}.zip"
          echo "tag_name=$TAG_NAME" >>"$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >>"$GITHUB_OUTPUT"

      - name: Xcode Project Tests
        run: xcodebuild test -project apps/mac-client/CodexSwitch.xcodeproj -scheme CodexSwitch -destination 'platform=macOS'

      - name: Build App Bundle
        run: ./scripts/package-macos-app.sh

      - name: Create Release Archive
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Codex Switch.app" "dist/${{ steps.meta.outputs.zip_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            dist/${{ steps.meta.outputs.zip_name }}
